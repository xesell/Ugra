apiVersion: apps/v1
kind: Deployment
metadata:
  name: ugra-api
  labels:
    app: ugra
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ugra
      component: api
  template:
    metadata:
      labels:
        app: ugra
        component: api
    spec:
      containers:
        - name: api
          image: ugra:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ugra-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ugra-api
spec:
  selector:
    app: ugra
    component: api
  ports:
    - port: 80
      targetPort: 8000
