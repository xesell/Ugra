services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ugra
      POSTGRES_PASSWORD: ugra
      POSTGRES_DB: ugra
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugra"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ugra:ugra@postgres:5432/ugra
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn ugra.main:app --host 0.0.0.0 --port 8000

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ugra:ugra@postgres:5432/ugra
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m ugra.presentation.telegram.bot

  web:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"
    volumes:
      - ./deploy/observability/otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml

volumes:
  pgdata:
  grafana_data:
